name: Alertas Code4Girl

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  enviar-alertas:
    runs-on: ubuntu-latest
    name: Verificar e enviar alertas de arte

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: |
          rm -rf node_modules
          npm install

      - name: Executar script de alertas
        run: node src/alertas.js
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DESIGNERS_EMAILS: ${{ secrets.DESIGNERS_EMAILS }}

      - name: Salvar rodízio no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rodizio.json
          git diff --staged --quiet || git commit -m "chore: atualizar rodizio [skip ci]"
          git push
